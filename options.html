<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snaps by Comet – Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px;
    }
    .card {
      width: 100%;
      max-width: 420px;
    }
    .header { margin-bottom: 28px; }
    .header h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; }
    .header p { font-size: 13px; color: #64748b; margin-top: 4px; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    input[type="text"], input[type="password"], select {
      width: 100%;
      padding: 11px 14px;
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: #6366f1; }
    .row { display: flex; gap: 10px; align-items: flex-end; }
    .row .field { flex: 1; margin-bottom: 0; }
    .btn {
      padding: 11px 22px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn:hover { background: #4f46e5; }
    #status { min-height: 18px; font-size: 13px; color: #4ade80; margin-top: 12px; }
    .divider { border: none; border-top: 1px solid #1e2130; margin: 24px 0; }
    .footer { font-size: 11px; color: #334155; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>🌠 Snaps by Comet</h1>
      <p>Tab Memory v0.1.0 — Configure your connection</p>
    </div>

    <div class="field">
      <label>Organisation ID</label>
      <input type="text" id="orgId" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
    </div>

    <div class="field">
      <label>Bridge API Key</label>
      <input type="password" id="apiKey" placeholder="bk_••••••••••••" />
    </div>

    <div class="field">
      <label>API Base URL</label>
      <input type="text" id="apiBase" placeholder="https://comet-bridge.vercel.app" />
    </div>

    <div class="row">
      <div class="field">
        <label>Auto-close tab after snap</label>
        <select id="autoClose">
          <option value="false">No</option>
          <option value="true">Yes</option>
        </select>
      </div>
      <button class="btn" id="save">Save Settings</button>
    </div>

    <div id="status"></div>

    <hr class="divider">
    <div class="footer">comet-bridge.vercel.app · Tech 4 Humanity</div>
  </div>

  <script src="options.js"></script>
</body>
</html>
